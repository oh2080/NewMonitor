<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NewsMonitor{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; }
        .navbar { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        .navbar-brand { font-weight: 700; color: #e0e0e0 !important; }

        /* 进度卡片 */
        .progress-card {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
            transition: all 0.3s;
        }
        .progress-card.status-pending { background: #f8f9fa; opacity: 0.7; }
        .progress-card.status-running {
            background: #fff;
            border-color: #0d6efd;
            box-shadow: 0 0 0 2px rgba(13,110,253,0.15);
        }
        .progress-card.status-done { background: #d1e7dd; border-color: #198754; }
        .progress-card.status-fail { background: #f8d7da; border-color: #dc3545; }

        .progress-card .card-icon { font-size: 1.2rem; margin-right: 8px; }
        .progress-card .card-label { font-weight: 600; }
        .progress-card .card-detail { color: #6c757d; font-size: 0.85rem; }

        /* 分数条 */
        .score-bar {
            height: 20px;
            border-radius: 4px;
            background: #e9ecef;
            overflow: hidden;
            position: relative;
        }
        .score-bar .fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s;
        }
        .score-bar .label {
            position: absolute;
            right: 6px;
            top: 0;
            line-height: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #333;
        }

        /* 日志面板 */
        .log-panel {
            max-height: 300px;
            overflow-y: auto;
            background: #1a1a2e;
            color: #adb5bd;
            font-family: 'Courier New', monospace;
            font-size: 0.82rem;
            border-radius: 6px;
            padding: 12px;
        }
        .log-panel .log-time { color: #6c757d; }
        .log-panel .log-error { color: #ff6b6b; }
        .log-panel .log-info { color: #74c0fc; }
        .log-panel .log-warn { color: #ffd43b; }

        /* 结果表格 */
        .result-table th { background: #f0f2f5; position: sticky; top: 0; }
        .stock-detail { display: none; }
        .stock-detail.show { display: table-row; }

        /* 标签 */
        .keyword-tag {
            display: inline-block;
            padding: 2px 10px;
            margin: 2px;
            border-radius: 12px;
            background: #e3f2fd;
            color: #1565c0;
            font-size: 0.85rem;
        }
        .opportunity-item {
            padding: 6px 12px;
            margin: 4px 0;
            background: #fff8e1;
            border-left: 3px solid #ffc107;
            border-radius: 0 4px 4px 0;
            font-size: 0.9rem;
        }

        /* 柱状图（纯 CSS） */
        .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 80px; }
        .bar-chart .bar {
            flex: 1;
            border-radius: 3px 3px 0 0;
            min-width: 24px;
            position: relative;
            transition: height 0.4s;
        }
        .bar-chart .bar-label {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 4px;
            color: #666;
        }
        .bar-chart .bar-value {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            font-weight: 600;
        }

        .spinner-border-sm { width: 1rem; height: 1rem; border-width: 2px; }

        .phase-header {
            font-size: 0.9rem;
            font-weight: 600;
            color: #495057;
            padding: 6px 0;
            border-bottom: 2px solid #dee2e6;
            margin-bottom: 8px;
        }

        .tab-content { min-height: 400px; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-dark mb-3">
        <div class="container-fluid">
            <span class="navbar-brand"><i class="bi bi-graph-up-arrow"></i> NewsMonitor</span>
            <span class="text-light" style="font-size:0.85rem">AI 热点股票监控系统</span>
        </div>
    </nav>

    <div class="container-fluid px-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
